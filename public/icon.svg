<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A6E6E" />
      <stop offset="100%" stop-color="#054040" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Subtle inner border pattern -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#D1E5E5" stroke-width="6" stroke-opacity="0.15" />

  <!-- Medical Cross / Spark Group -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Vertical Bar of Cross -->
    <rect x="-35" y="-130" width="70" height="260" rx="35" fill="#FFFFFF" />
    <!-- Horizontal Bar of Cross -->
    <rect x="-130" y="-35" width="260" height="70" rx="35" fill="#FFFFFF" />
    
    <!-- Central Energy Spark (Circle + Core) -->
    <circle cx="0" cy="0" r="45" fill="#D1E5E5" opacity="0.9" />
    <!-- Pulse Ring -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.4" />
    
    <!-- Star Sparkle Overlay -->
    <path d="M 0 -22 L 6 -6 L 22 0 L 6 6 L 0 22 L -6 6 L -22 0 L -6 -6 Z" fill="#0A6E6E" />
  </g>
</svg>
